name: CI Backend (Spring Boot)
on:
  push:
    branches: [ "develop", "main" ]
    paths:
      - 'backend/**'  # ¡CLAVE! Solo se ejecuta si hay cambios en la carpeta backend
  pull_request:
    branches: [ "develop", "main" ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Le dice a GitHub que entre a la carpeta
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn clean package