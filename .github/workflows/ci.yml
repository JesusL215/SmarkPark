name: SmartPark CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Construir Proyecto con Maven
      run: mvn clean install -DskipTests=true
